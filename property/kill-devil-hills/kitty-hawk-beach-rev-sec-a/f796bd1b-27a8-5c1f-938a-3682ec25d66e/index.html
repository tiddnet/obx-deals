    <label for="lookup-q" style="font-size:0.85rem;color:var(--muted)">Looking for a different property?</label>
    <input id="lookup-q" type="text" placeholder="House name or street address…" autocomplete="off">
    <div id="lookup-results" class="lookup-results"></div>
  </div>

</div>

  <script>
    function getVid() {
      var m = document.cookie.match(/obxd_vid=([^;]+)/);
      if (m) return m[1];
      var v = Math.random().toString(36).slice(2) + Date.now().toString(36);
      document.cookie = 'obxd_vid=' + v + '; max-age=31536000; path=/; domain=.obx.deals; SameSite=Lax; Secure';
      return v;
    }
    var vid = getVid();
    window.obxTrack = function(el) {
      if (navigator.doNotTrack === '1') return;
      var pid = el.getAttribute('data-property') || '';
      navigator.sendBeacon('https://track.obx.deals/c', JSON.stringify({
        property_id: pid, page: el.getAttribute('data-track-page') || 'canonical',
        visitor_id: vid, referrer: document.referrer || ''
      }));
    };
  </script>


  <script>
    (function() {
      var input = document.getElementById('lookup-q');
      var results = document.getElementById('lookup-results');
      var timer = null;
      input.addEventListener('input', function() {
        clearTimeout(timer);
        var q = input.value.trim();
        if (q.length < 2) { results.innerHTML = ''; return; }
        timer = setTimeout(function() {
          fetch('https://search-api.obx.deals/lookup?q=' + encodeURIComponent(q))
            .then(function(r) { return r.json(); })
            .then(function(data) {
              results.innerHTML = (data.results || []).map(function(r) {
                return '<a href="' + r.url + '">' + r.display_name + ' — ' + r.community + '</a>';
              }).join('') || '<span style="color:var(--muted)">No matches.</span>';
            })
            .catch(function() {});
        }, 300);
      });
    })();
  </script>
